locations:
  cafe:
    description: "A warm cafe with fresh coffee, pastry cases, window seats, and a counter where town gossip gathers."
    objects: [coffee_maker, pastry_case, corner_table]
  town_square:
    description: "The cobbled town square, anchored by a notice board, a dry fountain, and paths leading toward every busy corner of town."
    objects: [notice_board, fountain, town_map]
  library:
    description: "The public library, with study tables, deep armchairs, local-history shelves, and a locked archive door."
    objects: [study_table, reading_chair, local_history_shelf]
  archive_room:
    description: "A narrow archive room behind the library, full of labeled boxes, map drawers, brittle ledgers, and dust."
    objects: [archive_boxes, map_table, old_ledger]
  riverside_path:
    description: "A willow-lined path beside the river, marked by old stone distance markers and a view toward the mill."
    objects: [river_marker, willow_bench]
  old_mill:
    description: "The abandoned old mill at the bend in the river, quiet except for the creak of the wheel and loose shutters."
    objects: [old_mill_wheel, mill_door, grain_sacks]
  market_stalls:
    description: "A row of morning market stalls with produce crates, folded awnings, and neighbors trading small news."
    objects: [market_crates, flower_stall, weighing_scale]
  community_hall:
    description: "The community hall, used for meetings, lost-and-found notices, and planning town festivals."
    objects: [meeting_table, lost_and_found_box, event_calendar]
  newspaper_office:
    description: "A cramped newspaper office with a typewriter, clippings wall, spare notebooks, and a kettle in the corner."
    objects: [typewriter, clippings_wall, reporter_notebook]
  park:
    description: "A small park with benches, oak trees, and a path that loops around a still pond."
    objects: [bench, pond]

